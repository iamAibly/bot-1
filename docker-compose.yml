version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: telegram-activation-bot
    restart: always
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - CONFIG_FILE=/app/data/config.json
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
