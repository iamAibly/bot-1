version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: telegram-activation-bot
    restart: always
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - CONFIG_FILE=/app/data/config.json
      - BOT_CONFIG=${BOT_CONFIG:-}
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
    ports:
      - "8080:8080"  # Для healthcheck (опционально)
